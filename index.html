<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Off-Axis Fire</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }

    #status {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 120, 0, 0.75);
      font-family: monospace;
      font-size: 13px;
      pointer-events: none;
      white-space: nowrap;
    }

    #permission-prompt {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      border: 1px solid #f80;
      border-radius: 8px;
      padding: 28px 32px;
      color: #f80;
      font-family: monospace;
      text-align: center;
      z-index: 10;
    }
    #permission-prompt p { margin-bottom: 10px; line-height: 1.5; }
    #permission-prompt button {
      margin-top: 8px;
      background: transparent;
      border: 1px solid #f80;
      color: #f80;
      font-family: monospace;
      font-size: 13px;
      padding: 6px 20px;
      cursor: pointer;
      border-radius: 4px;
    }
    #permission-prompt button:hover { background: rgba(255,136,0,0.15); }
  </style>

  <!-- Three.js r160 via importmap (ES module) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <!-- MediaPipe FaceMesh (global, non-module) -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div id="status">Initialising…</div>

  <div id="permission-prompt">
    <p>Camera access was denied.</p>
    <p>Move your mouse to shift the perspective instead.</p>
    <button onclick="document.getElementById('permission-prompt').style.display='none'">Got it</button>
  </div>

  <!-- Fallback for browsers without importmap support -->
  <script nomodule>
    document.getElementById('status').textContent =
      'Please use a modern browser (Chrome 112+, Firefox 108+, Safari 16.4+)';
  </script>

  <script type="module" src="src/main.js"></script>
</body>
</html>
