<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#05060b" />
  <title>Off-Axis RGB Wireframe Cube</title>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #05060b; overflow: hidden; }
    body { font-family: ui-monospace, Menlo, Consolas, monospace; color: #cfd5e4; }

    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      cursor: crosshair;
    }

    #ui {
      position: fixed;
      bottom: max(16px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
      z-index: 5;
    }

    #status {
      font-size: 12px;
      letter-spacing: 0.04em;
      color: rgba(43, 216, 255, 0.85);
      text-shadow: 0 0 6px rgba(43, 216, 255, 0.35);
      white-space: nowrap;
      max-width: 92vw;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .btn {
      display: none;
      background: rgba(5, 6, 11, 0.72);
      border: 1px solid rgba(43, 216, 255, 0.55);
      color: rgba(43, 216, 255, 0.95);
      font: inherit;
      font-size: 12px;
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: background 120ms ease;
    }
    .btn:hover, .btn:focus-visible {
      background: rgba(43, 216, 255, 0.16);
      outline: none;
    }
    .btn:disabled { opacity: 0.5; cursor: default; }

    #fallback-note {
      display: none;
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      background: rgba(5, 6, 11, 0.72);
      border: 1px solid rgba(43, 216, 255, 0.4);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 11px;
      color: rgba(43, 216, 255, 0.85);
      z-index: 5;
    }

    #legacy-msg {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      font-size: 14px;
      color: #cfd5e4;
    }
  </style>

  <!-- Three.js loaded only by the WebGL scene module via importmap. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <!-- MediaPipe FaceMesh globals (only used when user opts in to webcam). -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div id="fallback-note">Software fallback (no WebGL)</div>

  <div id="ui">
    <div id="status">Initialising…</div>
    <div class="btn-row">
      <button id="btn-tilt"   class="btn" type="button">Enable tilt</button>
      <button id="btn-webcam" class="btn" type="button">Enable webcam</button>
    </div>
  </div>

  <noscript>
    <div id="legacy-msg">JavaScript is required to view this demo.</div>
  </noscript>

  <!-- Browsers that don't support ES modules see a friendly message. -->
  <script nomodule>
    document.getElementById('status').textContent =
      'Please use a modern browser (Chrome, Firefox, Safari, or Edge).';
  </script>

  <script type="module" src="src/main.js"></script>
</body>
</html>
